<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Offline — PDF Tool</title>
<link rel="icon" href="icons/favicon-32.png">
<style>
  :root { --brand:#b02a37; }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100dvh; display:grid; place-items:center;
    font:16px/1.6 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:#faf7f7; color:#2b2b2b; padding:24px;
  }
  .card{max-width:420px;text-align:center}
  .badge{
    width:76px;height:76px;border-radius:20px;background:var(--brand);
    color:#fff;display:grid;place-items:center;margin:0 auto 20px;
    font-weight:700;font-size:22px;letter-spacing:.5px;
  }
  h1{font-size:22px;margin:0 0 8px}
  p{margin:0 0 20px;color:#5a5a5a}
  button{
    background:var(--brand);color:#fff;border:0;border-radius:10px;
    padding:12px 24px;font-size:15px;font-weight:600;cursor:pointer;
  }
  button:hover{background:#8f222c}
</style>
</head>
<body>
  <div class="card">
    <div class="badge">PDF</div>
    <h1>You're offline</h1>
    <p>This page hasn't been saved for offline use yet. Reconnect once, and the tool will stay available without internet after that.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
